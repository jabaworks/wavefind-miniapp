<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Музыка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0c; --bg2: #111115; --bg3: #1a1a20;
    --surface: #1e1e26; --surface2: #26262f;
    --accent: #c8a8ff; --accent2: #9b72ef;
    --text: #f0eeff; --text2: #9997b0; --text3: #5a5870;
    --border: rgba(200,168,255,0.08); --border2: rgba(200,168,255,0.15);
    --radius: 14px; --radius-sm: 8px;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100%; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; flex: 1; }
  .tabs { display: flex; padding: 12px 20px; gap: 6px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 8px 0; text-align: center; font-size: 13px; font-weight: 500; color: var(--text3); background: none; border: 1px solid transparent; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.18s; }
  .tab.active { color: var(--accent); background: rgba(200,168,255,0.07); border-color: var(--border2); }
  .search-wrap { padding: 14px 20px; background: var(--bg); }
  .search-box { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 50px; overflow: hidden; transition: border-color 0.2s; }
  .search-box:focus-within { border-color: var(--border2); }
  .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; padding: 11px 16px; font-family: 'Inter', sans-serif; }
  .search-box input::placeholder { color: var(--text3); }
  .search-btn { background: none; border: none; padding: 10px 16px; color: var(--text3); cursor: pointer; font-size: 18px; display: flex; align-items: center; transition: color 0.15s; }
  .search-btn:hover { color: var(--accent); }
  .content { flex: 1; overflow-y: auto; padding: 4px 0 100px; }
  .section-label { padding: 12px 20px 8px; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .track-card { display: flex; align-items: center; gap: 13px; padding: 10px 20px; cursor: pointer; transition: background 0.15s; }
  .track-card:hover { background: var(--bg2); }
  .track-card:active { background: var(--bg3); }
  .track-cover { width: 52px; height: 52px; border-radius: 10px; background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 20px; overflow: hidden; }
  .track-cover img { width: 100%; height: 100%; object-fit: cover; }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .track-artist { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-duration { font-size: 12px; color: var(--text3); flex-shrink: 0; }
  .track-rank { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text3); width: 22px; text-align: center; flex-shrink: 0; }
  .player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border2); padding: 12px 20px 20px; display: none; flex-direction: column; gap: 10px; z-index: 20; }
  .player.visible { display: flex; }
  .player-top { display: flex; align-items: center; gap: 12px; }
  .player-cover { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .player-info { flex: 1; min-width: 0; }
  .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .player-artist { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctrl-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: color 0.15s; padding: 4px; }
  .ctrl-btn:hover { color: var(--text); }
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-time { font-size: 10px; color: var(--text3); min-width: 28px; }
  .progress-bar { flex: 1; height: 3px; background: var(--surface2); border-radius: 3px; cursor: pointer; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.5s linear; }
  .detail-view { position: fixed; inset: 0; background: var(--bg); z-index: 30; display: none; flex-direction: column; overflow-y: auto; }
  .detail-view.open { display: flex; }
  .detail-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .back-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 22px; display: flex; padding: 4px; }
  .back-btn:hover { color: var(--text); }
  .detail-cover { width: 100%; aspect-ratio: 1; max-height: 300px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 60px; overflow: hidden; }
  .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
  .detail-meta { padding: 20px 20px 12px; }
  .detail-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: -0.3px; }
  .detail-artist { font-size: 15px; color: var(--accent); margin-bottom: 4px; }
  .detail-album { font-size: 13px; color: var(--text3); }
  .detail-actions { display: flex; gap: 10px; padding: 0 20px 16px; }
  .action-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
  .action-btn:hover { background: var(--surface2); }
  .action-btn.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .action-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
  .detail-section { padding: 0 20px 16px; }
  .detail-section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  .yt-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); font-size: 14px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .yt-btn:hover { background: var(--surface2); color: var(--text); }
  .lyrics-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-size: 14px; line-height: 1.8; color: var(--text2); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); font-size: 14px; gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 14px; }
  audio { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">♪ wavefind</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search')">Search</button>
  <button class="tab" onclick="switchTab('charts')">Charts</button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Track, artist, album..." onkeydown="if(event.key==='Enter') doSearch()">
    <button class="search-btn" onclick="doSearch()">⌕</button>
  </div>
</div>

<div class="content" id="content">
  <div class="empty">Search for music or check the charts</div>
</div>

<div class="player" id="player">
  <div class="player-top">
    <img class="player-cover" id="p-cover" src="" alt="">
    <div class="player-info">
      <div class="player-title" id="p-title"></div>
      <div class="player-artist" id="p-artist"></div>
    </div>
    <button class="ctrl-btn" onclick="togglePlay()" id="play-btn">▶</button>
  </div>
  <div class="progress-wrap">
    <span class="progress-time" id="p-cur">0:00</span>
    <div class="progress-bar" onclick="seekAudio(event)">
      <div class="progress-fill" id="p-fill"></div>
    </div>
    <span class="progress-time" id="p-dur">0:30</span>
  </div>
</div>

<div class="detail-view" id="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <span style="font-size:15px;font-weight:500;color:var(--text2)">Track</span>
  </div>
  <div class="detail-cover" id="d-cover">♪</div>
  <div class="detail-meta">
    <div class="detail-title" id="d-title"></div>
    <div class="detail-artist" id="d-artist"></div>
    <div class="detail-album" id="d-album"></div>
  </div>
  <div class="detail-actions">
    <button class="action-btn primary" onclick="playFromDetail()">▶ Preview</button>
    <button class="action-btn" onclick="openDeezer()">Open Deezer</button>
  </div>
  <div class="detail-section" id="video-section" style="display:none">
    <div class="detail-section-title">Music Video</div>
    <div id="video-wrap"></div>
  </div>
  <div class="detail-section" id="lyrics-section" style="display:none">
    <div class="detail-section-title">Lyrics</div>
    <div class="lyrics-box" id="lyrics-box"></div>
  </div>
</div>

<audio id="audio-player" preload="none"></audio>

<script>
  const API = 'https://f056c74f89a7aa.lhr.life';

  const audio = document.getElementById('audio-player');
  let currentTrack = null;
  let isPlaying = false;

  if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

  const startQuery = new URLSearchParams(window.location.search).get('q')
    || window.Telegram?.WebApp?.initDataUnsafe?.start_param;
  if (startQuery) {
    document.getElementById('search-input').value = decodeURIComponent(startQuery);
    setTimeout(doSearch, 400);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', i === (tab === 'search' ? 0 : 1)));
    if (tab === 'charts') loadCharts();
  }

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    showLoading();
    try {
      const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderTracks(data.data || [], false);
    } catch {
      document.getElementById('content').innerHTML = '<div class="empty">Could not connect to server. Is the bot running?</div>';
    }
  }

  async function loadCharts() {
    showLoading();
    try {
      const res = await fetch(`${API}/charts`);
      const data = await res.json();
      renderTracks(data.data || [], true);
    } catch {
      document.getElementById('content').innerHTML = '<div class="empty">Could not connect to server.</div>';
    }
  }

  function renderTracks(tracks, ranked) {
    const el = document.getElementById('content');
    if (!tracks.length) { el.innerHTML = '<div class="empty">No results found</div>'; return; }
    el.innerHTML = `<div class="section-label">${ranked ? 'Top Tracks' : 'Results — ' + tracks.length}</div>`
      + tracks.map((t, i) => `
        <div class="track-card" onclick='openDetail(${JSON.stringify(t)})'>
          ${ranked ? `<div class="track-rank">${i+1}</div>` : ''}
          <div class="track-cover">
            ${t.album?.cover_small ? `<img src="${t.album.cover_small}" loading="lazy" alt="">` : '♪'}
          </div>
          <div class="track-info">
            <div class="track-title">${esc(t.title)}</div>
            <div class="track-artist">${esc(t.artist?.name || '')}</div>
          </div>
          <div class="track-duration">${fmtTime(t.duration)}</div>
        </div>`).join('');
  }

  function openDetail(track) {
    currentTrack = track;
    document.getElementById('d-title').textContent = track.title;
    document.getElementById('d-artist').textContent = track.artist?.name || '';
    document.getElementById('d-album').textContent = track.album?.title || '';
    const img = track.album?.cover_xl || track.album?.cover_big;
    document.getElementById('d-cover').innerHTML = img ? `<img src="${img}" alt="">` : '♪';
    document.getElementById('detail-view').classList.add('open');
    loadVideo(track.title, track.artist?.name);
    loadLyrics(track.artist?.name, track.title);
  }

  function closeDetail() {
    document.getElementById('detail-view').classList.remove('open');
    document.getElementById('video-wrap').innerHTML = '';
    document.getElementById('video-section').style.display = 'none';
    document.getElementById('lyrics-section').style.display = 'none';
  }

  function playFromDetail() {
    if (!currentTrack?.preview) { alert('No preview available for this track.'); return; }
    playTrack(currentTrack);
    closeDetail();
  }

  function openDeezer() {
    if (currentTrack?.link) window.open(currentTrack.link, '_blank');
  }

  function loadVideo(title, artist) {
    const q = encodeURIComponent(`${artist} ${title} official video`);
    document.getElementById('video-wrap').innerHTML =
      `<a class="yt-btn" href="https://www.youtube.com/results?search_query=${q}" target="_blank">▶ Watch on YouTube</a>`;
    document.getElementById('video-section').style.display = 'block';
  }

  async function loadLyrics(artist, title) {
    const box = document.getElementById('lyrics-box');
    box.textContent = 'Loading...';
    document.getElementById('lyrics-section').style.display = 'block';
    try {
      const res = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artist)}/${encodeURIComponent(title)}`);
      const data = await res.json();
      box.textContent = data.lyrics?.trim() || 'Lyrics not found.';
    } catch {
      box.textContent = 'Could not load lyrics.';
    }
  }

  function playTrack(track) {
    audio.src = track.preview;
    audio.play();
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    document.getElementById('p-title').textContent = track.title;
    document.getElementById('p-artist').textContent = track.artist?.name || '';
    document.getElementById('p-cover').src = track.album?.cover_small || '';
    document.getElementById('player').classList.add('visible');
  }

  function togglePlay() {
    if (!audio.src) return;
    if (isPlaying) { audio.pause(); isPlaying = false; document.getElementById('play-btn').textContent = '▶'; }
    else { audio.play(); isPlaying = true; document.getElementById('play-btn').textContent = '⏸'; }
  }

  function seekAudio(e) {
    if (!audio.duration) return;
    const bar = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - bar.left) / bar.width) * audio.duration;
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    document.getElementById('p-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('p-cur').textContent = fmtTime(audio.currentTime);
  });

  audio.addEventListener('ended', () => { isPlaying = false; document.getElementById('play-btn').textContent = '▶'; });

  function fmtTime(s) { s = Math.floor(s||0); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
  function showLoading() { document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>'; }
  function esc(s) { return s?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') || ''; }
</script>
</body>
</html>
